<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>肺癌临床每日速递 — {{date}}</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="container">

<header class="page-header">
  <h1 class="site-title">肺癌临床每日速递</h1>
  <p class="site-subtitle">Lung Cancer Daily Brief</p>
  <div class="header-meta">
    <span class="date-badge">{{date}}</span>
    <a href="archive/" class="archive-link">归档</a>
  </div>
</header>

<section class="countdown-section">
  <h2 class="countdown-title">大会倒计时</h2>
  <div id="countdown-grid" class="countdown-grid">
    <span class="countdown-loading">加载中...</span>
  </div>
</section>

<main>
  <div class="summary-bar">
    <span>共 <strong>{{article_count}}</strong> 篇</span>
    <span class="summary-time">生成于 {{generated_at}}</span>
  </div>

  {{content_html}}
</main>

<footer class="page-footer">
  <p>数据来源: PubMed &middot; 自动生成 &middot; <a href="https://github.com/lizeqing919-cpu/lung-cancer-daily">GitHub</a></p>
  <p>{{generated_at}}</p>
</footer>

</div>
{{countdown_script}}
<script src="assets/js/main.js"></script>
</body>
</html>
